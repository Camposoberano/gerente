services:
  gerente:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      NODE_ENV: production
      GERENTE_DASHBOARD_HOST: 0.0.0.0
      GERENTE_DASHBOARD_PORT: 8787
      GERENTE_PUBLIC_BASE: ${GERENTE_PUBLIC_BASE}
      GERENTE_WEBHOOK_TOKEN: ${GERENTE_WEBHOOK_TOKEN}
      UAZAPI_URL: ${UAZAPI_URL}
      UAZAPI_ADMIN_TOKEN: ${UAZAPI_ADMIN_TOKEN}
      UAZAPI_INSTANCE_TOKEN: ${UAZAPI_INSTANCE_TOKEN}
      WHATSAPP_GO_URL: ${WHATSAPP_GO_URL}
      WHATSAPP_GO_INSTANCE_TOKEN: ${WHATSAPP_GO_INSTANCE_TOKEN}
      WHATSAPP_NOTIFY_TO: ${WHATSAPP_NOTIFY_TO}
      GERENTE_WHATSAPP_GROUP_JID: ${GERENTE_WHATSAPP_GROUP_JID}
      COOLIFY_API_URL: ${COOLIFY_API_URL}
      COOLIFY_API_TOKEN: ${COOLIFY_API_TOKEN}
      PORTAINER_API_URL: ${PORTAINER_API_URL}
      PORTAINER_API_TOKEN: ${PORTAINER_API_TOKEN}
      GITHUB_API_URL: ${GITHUB_API_URL}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      FIRECRAWL_API_URL: ${FIRECRAWL_API_URL}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY}
      JINA_READER_URL: ${JINA_READER_URL}
      JINA_API_KEY: ${JINA_API_KEY}
      SENTRY_MCP_URL: ${SENTRY_MCP_URL}
      CLOUDFLARE_MCP_URL: ${CLOUDFLARE_MCP_URL}
      CONTEXT7_MCP_URL: ${CONTEXT7_MCP_URL}
      CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}
